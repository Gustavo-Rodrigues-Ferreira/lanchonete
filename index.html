<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/hamburger.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/0c81930882.js" crossorigin="anonymous"></script>
    <title>Hamburgueria</title>
</head>

<body>
    <header class="cabecalho">
        <div class="div-logo">
            <img src="imagens/hamburger.png" alt="logo">
        </div>

        <div class="div-button">
            <a href="">
                <button>LOGIN</button>
            </a>
        </div>
    </header>

    <main>
        <section class="section-01">
            <div class="div01">
                <p>Peça seu lanche com a <span>Hamburgueria mais famosa</span></p>
                <nav>
                    <ul class="ul-div01">
                        <li>
                            <a href="">Lanches</a>
                        </li>

                        <li>
                            <a href="">Batatas</a>
                        </li>

                        <li>
                            <a href="">Combos</a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="div02">
                <div>
                    <i class="fa-solid fa-burger">Lanches</i>
                </div>
                <div>
                    <i class="fa-solid fa-basket-shopping">Carrinho</i>
                </div>
            </div>
        </section>

        <section class="section-02"></section>
        <section class="section-03"></section>
        <section class="section-04"></section>
    </main>

    <footer class="rodape"></footer>
</body>

</html>
